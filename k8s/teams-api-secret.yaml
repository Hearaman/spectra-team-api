apiVersion: v1
kind: Secret
metadata:
  name: teams-api-secret
  namespace: platform-system
type: Opaque
stringData:
  # Point at your EXISTING PostgreSQL in platform-system.
  # Create a dedicated db + user first (see README "Step A").
  # Adjust the host to your real service name: kubectl get svc -n platform-system
  DATABASE_URL: "postgresql://teams:CHANGE_ME_DB_PASSWORD@postgresql.platform-system.svc.cluster.local:5432/spectra_teams"
  # Shared secret callers must present as: Authorization: Bearer <token>
  # Generate one: openssl rand -hex 32
  API_TOKEN: "CHANGE_ME_LONG_RANDOM_STRING"
