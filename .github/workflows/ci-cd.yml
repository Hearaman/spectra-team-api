name: Build and Deploy teams-api

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt into Node.js 24 for JavaScript actions ahead of GitHub's 2026-06-02
# auto-migration (matches the spectra-idp portal CI).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  IMAGE: ghcr.io/hearaman/spectra-team-api

jobs:
  # Quality gate. This service has no unit tests yet, so the gate is a strict
  # typecheck; `npm run test --if-present` picks up a test script automatically
  # once one is added. Runs on PRs too, so it can be a required status check.
  # No package-lock.json here -> `npm install` (not `npm ci`) and no npm cache.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit tests (if present)
        run: npm run test --if-present

  build-and-deploy:
    needs: test
    # Publish + roll the cluster only on a push to main, never on a PR.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # The image package is user-owned and not linked to this repo's Actions,
      # so the built-in GITHUB_TOKEN gets 403 on push. Authenticate with a PAT
      # that has write:packages (GHCR_PAT repo secret).
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: hearaman
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Verify cluster connectivity
        run: |
          kubectl cluster-info
          kubectl get nodes

      # Apply the workload, Service and Ingress only — NOT the teams-api-secret*
      # manifests (placeholders / *.local). The live secret is managed
      # out-of-band. This deployment uses no named imagePullSecret.
      - name: Deploy to Kubernetes
        run: |
          kubectl apply \
            -f k8s/teams-api-deployment.yaml \
            -f k8s/teams-api-service.yaml \
            -f k8s/teams-api-ingress.yaml
          kubectl -n platform-system set image deploy/teams-api \
            teams-api=${{ env.IMAGE }}:${{ github.sha }}
          kubectl -n platform-system rollout status deploy/teams-api --timeout=300s
